name: Bug 报告
description: 报告一个可以复现的问题
title: "[Bug] "
labels:
  - bug
  - triage
body:
  - type: markdown
    attributes:
      value: |
        感谢提交问题。请尽量写清复现步骤、期望结果和实际结果，避免只给一句“有问题”。

  - type: input
    id: summary
    attributes:
      label: 问题概述
      description: 用一句话描述问题
      placeholder: 例如：后台上传文档后任务一直卡在 parsing
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: 影响范围
      options:
        - Web 用户端
        - 后端 API
        - 管理后台 Studio
        - 微信小程序
        - RAG / 知识库链路
        - 部署 / CI / 仓库配置
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请按顺序列出复现步骤
      placeholder: |
        1. 进入...
        2. 点击...
        3. 输入...
        4. 观察到...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望结果
      placeholder: 例如：上传后应进入 success 状态并可搜索
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际结果
      placeholder: 例如：任务停在 parsing，页面没有报错
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 浏览器、系统、Python 版本、部署方式等
      placeholder: 例如：Windows 11 / Chrome 135 / 本地 FastAPI / Python 3.12

  - type: textarea
    id: logs
    attributes:
      label: 日志或截图
      description: 可以粘贴报错、终端输出、接口返回或截图
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已经检查没有在 issue 中泄露密码、Token、API Key 或私有数据
          required: true
        - label: 我已经确认这是可复现的问题，而不是单次偶发
          required: true
